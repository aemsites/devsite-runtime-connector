name: Build
on:
  push:
    branches-ignore:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js LTS (Krypton)
        uses: actions/setup-node@v6
        with:
          node-version: "lts/krypton"
      - run: npm ci
      - run: npm test